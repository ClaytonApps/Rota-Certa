<!doctype html>
<html lang="pt-br">
<head>
    <meta charset="utf-8">
    <meta name="viewport" content="width=device-width, initial-scale=1, viewport-fit=cover">
    <meta name="theme-color" content="#1e40af">
    <title>LucroMetro · Rota Certa</title>

    <link href="https://cdn.jsdelivr.net/npm/bootstrap@5.3.3/dist/css/bootstrap.min.css" rel="stylesheet">
    <link href="https://cdn.jsdelivr.net/npm/bootstrap-icons@1.11.3/font/bootstrap-icons.css" rel="stylesheet">
    <link rel="preconnect" href="https://fonts.googleapis.com">
    <link rel="preconnect" href="https://fonts.gstatic.com" crossorigin>
    <link href="https://fonts.googleapis.com/css2?family=Inter:wght@400;500;600;700;800&display=swap" rel="stylesheet">
    <link href="app.css" rel="stylesheet">
    <link rel="manifest" href="manifest.json">
    <style>body { font-family: 'Inter', -apple-system, BlinkMacSystemFont, "Segoe UI", Roboto, sans-serif; }</style>
</head>
<body>

<header class="topbar">
    <div class="container d-flex justify-content-between align-items-center">
        <div class="d-flex align-items-center" style="flex: 1;">
            <a href="#/" class="brand text-white text-decoration-none">
                <span class="brand-icon"><i class="bi bi-speedometer2"></i></span>
                <span>LucroMetro <small>Rota Certa</small></span>
            </a>
            <nav class="top-nav">
                <a href="#/"          data-route="dashboard"><i class="bi bi-house-door-fill"></i> Início</a>
                <a href="#/historico" data-route="historico"><i class="bi bi-clock-history"></i> Histórico</a>
                <a href="#/nova"      data-route="nova"><i class="bi bi-plus-circle-fill"></i> Nova jornada</a>
                <a href="#" id="btn-export" title="Baixar dados (JSON)"><i class="bi bi-download"></i> Exportar</a>
                <a href="#" id="btn-import" title="Importar JSON"><i class="bi bi-upload"></i> Importar</a>
            </nav>
        </div>
        <div id="topbar-action" class="d-none d-lg-block"></div>
    </div>
</header>

<main class="container py-3 py-lg-4">
    <div id="alerts"></div>
    <div id="view"></div>
</main>

<nav class="bottom-nav">
    <a href="#/"          data-route="dashboard"><i class="bi bi-house-door-fill"></i>Início</a>
    <a href="#/historico" data-route="historico"><i class="bi bi-clock-history"></i>Histórico</a>
    <a href="#/nova" class="add-btn">
        <span class="add-circle"><i class="bi bi-plus-lg"></i></span>
        Nova
    </a>
    <a href="#" id="btn-export-mobile"><i class="bi bi-download"></i>Exportar</a>
</nav>

<input type="file" id="import-file" accept="application/json" hidden>

<script src="voice.js"></script>
<script src="app.js"></script>
</body>
</html>
