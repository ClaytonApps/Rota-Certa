<html lang="pt-br">
<head>
<meta charset="utf-8">

<link rel="manifest" href="manifest.webmanifest">

<script src="https://cdn.jsdelivr.net/npm/jspdf-autotable@3.8.2/dist/jspdf.plugin.autotable.min.js" defer></script>
<script src="https://cdn.jsdelivr.net/npm/xlsx@0.18.5/dist/xlsx.full.min.js" defer></script>

<style>
:root {
    --primary: #0f1e3a;
    --primary-dark: #0a1628;
    --primary-light: #1e3a5f;
    --gray-dark: #1f2937;
    --gray: #374151;
    --gray-light: #6b7280;
    --accent: #10b981;
    --accent-dark: #059669;
    --accent-light: #34d399;
    --bg: #f3f4f6;
    --surface: #ffffff;
    --border: #d1d5db;
    --text: #111827;
    --text-muted: #4b5563;
    --shadow-sm: 0 1px 2px rgba(15, 30, 58, .05);
    --shadow: 0 4px 16px rgba(15, 30, 58, .12);
    --shadow-lg: 0 12px 32px rgba(15, 30, 58, .18);
    --gradient-primary: linear-gradient(135deg, #0f1e3a 0%, #1f2937 100%);
    --gradient-accent: linear-gradient(135deg, #059669 0%, #10b981 100%);
    --gradient-mix: linear-gradient(135deg, #0f1e3a 0%, #10b981 100%);
}

* { -webkit-tap-highlight-color: transparent; }

body {
    background: var(--bg);
    color: var(--text);
    font-family: 'Inter', -apple-system, BlinkMacSystemFont, "Segoe UI", Roboto, "Helvetica Neue", sans-serif;
    padding-bottom: 90px;
    min-height: 100vh;
}

main.container { max-width: 1180px; }

@media (min-width: 992px) {
    body { padding-bottom: 2rem; }
}

.topbar {
    background: var(--gradient-primary);
    color: #fff;
    padding: 1rem 0 1.25rem;
    box-shadow: var(--shadow);
    position: sticky;
    top: 0;
    z-index: 1020;
}
.topbar .brand {
    font-weight: 800;
    letter-spacing: .3px;
    font-size: 1.25rem;
    display: flex;
    align-items: center;
    gap: .5rem;
}
.topbar .brand-icon {
    background: rgba(255,255,255,.18);
    width: 36px; height: 36px;
    border-radius: 10px;
    display: inline-flex; align-items: center; justify-content: center;
    font-size: 1.1rem;
}
.topbar .brand small {
    display: block;
    font-size: .7rem;
    font-weight: 500;
    opacity: .85;
    letter-spacing: 1.2px;
    text-transform: uppercase;
}

.top-nav {
    display: none;
    gap: .25rem;
    align-items: center;
    margin-left: 2rem;
    flex: 1;
}
.top-nav a {
    color: rgba(255, 255, 255, .85);
    text-decoration: none;
    padding: .55rem 1rem;
    border-radius: 10px;
    font-weight: 600;
    font-size: .9rem;
    display: inline-flex;
    align-items: center;
    gap: .4rem;
    transition: all .15s ease;
}
.top-nav a:hover { background: rgba(255, 255, 255, .1); color: #fff; }
.top-nav a.active {
    background: rgba(255, 255, 255, .18);
    color: #fff;
    box-shadow: inset 0 -2px 0 var(--accent-light);
}
@media (min-width: 992px) {
    .top-nav { display: flex; }
    .topbar .brand small { display: inline; margin-left: .5rem; opacity: .7; }
}

.card {
    border: 0;
    border-radius: 1rem;
    background: var(--surface);
    box-shadow: var(--shadow-sm);
    transition: transform .15s ease, box-shadow .15s ease;
}
.card:hover { box-shadow: var(--shadow); }

.hero-card {
    background: var(--gradient-mix);
    color: #fff;
    border-radius: 1.25rem;
    padding: 1.5rem;
    box-shadow: var(--shadow-lg);
    position: relative;
    overflow: hidden;
}
.hero-card::after {
    content: '';
    position: absolute;
    right: -40px; top: -40px;
    width: 160px; height: 160px;
    background: radial-gradient(circle, rgba(255,255,255,.18) 0%, transparent 70%);
    border-radius: 50%;
}
.hero-card .label {
    font-size: .75rem;
    letter-spacing: 1.5px;
    text-transform: uppercase;
    opacity: .9;
    font-weight: 600;
}
.hero-card .value {
    font-size: 2.25rem;
    font-weight: 800;
    margin: .25rem 0;
    letter-spacing: -.5px;
}
.hero-card .meta {
    font-size: .85rem;
    opacity: .9;
    display: flex;
    align-items: center;
    gap: .35rem;
}

.metric-card { padding: 1rem; height: 100%; }
.metric-card .label {
    font-size: .7rem;
    color: var(--text-muted);
    text-transform: uppercase;
    letter-spacing: 1px;
    font-weight: 600;
    display: flex;
    align-items: center;
    gap: .35rem;
}
.metric-card .label i { font-size: .9rem; }
.metric-card .value {
    font-size: 1.45rem;
    font-weight: 700;
    margin-top: .35rem;
    color: var(--text);
}
.metric-card.accent .value { color: var(--accent-dark); }
.metric-card.primary .value { color: var(--primary); }
.metric-card .icon-pill {
    width: 32px; height: 32px;
    border-radius: 10px;
    display: inline-flex; align-items: center; justify-content: center;
    font-size: .95rem;
    margin-bottom: .25rem;
}
.metric-card.accent .icon-pill { background: rgba(16, 185, 129, .12); color: var(--accent-dark); }
.metric-card.primary .icon-pill { background: rgba(30, 64, 175, .1); color: var(--primary); }

.period-filter {
    display: flex;
    gap: .5rem;
    overflow-x: auto;
    padding-bottom: .25rem;
    margin-bottom: 1rem;
    scrollbar-width: none;
}
.period-filter::-webkit-scrollbar { display: none; }
.period-filter .chip {
    flex: 0 0 auto;
    padding: .5rem 1rem;
    border-radius: 999px;
    background: var(--surface);
    color: var(--text-muted);
    border: 1.5px solid var(--border);
    font-size: .85rem;
    font-weight: 600;
    text-decoration: none;
    transition: all .15s ease;
    white-space: nowrap;
}
.period-filter .chip:hover { border-color: var(--primary-light); color: var(--primary); }
.period-filter .chip.active {
    background: var(--gradient-primary);
    color: #fff;
    border-color: transparent;
    box-shadow: 0 4px 12px rgba(30, 64, 175, .25);
}

.section-title {
    font-size: .8rem;
    font-weight: 700;
    text-transform: uppercase;
    letter-spacing: 1.2px;
    color: var(--text-muted);
    margin: 1.5rem 0 .75rem;
    display: flex;
    align-items: center;
    justify-content: space-between;
}

.journey-list { display: flex; flex-direction: column; gap: .65rem; }

.journey-item {
    background: var(--surface);
    border-radius: 14px;
    padding: 1rem;
    box-shadow: var(--shadow-sm);
    border-left: 4px solid var(--primary);
    text-decoration: none;
    color: var(--text);
    transition: transform .15s ease, box-shadow .15s ease;
    display: block;
}
.journey-item:hover { transform: translateY(-1px); box-shadow: var(--shadow); color: var(--text); }
.journey-item .row-top { display: flex; justify-content: space-between; align-items: center; margin-bottom: .5rem; }
.journey-item .date { font-weight: 700; color: var(--text); display: flex; align-items: center; gap: .4rem; }
.journey-item .date i { color: var(--primary); }
.journey-item .amount {
    background: var(--gradient-accent);
    color: #fff;
    padding: .3rem .7rem;
    border-radius: 999px;
    font-weight: 700;
    font-size: .9rem;
    box-shadow: 0 2px 6px rgba(16, 185, 129, .3);
}
.journey-item .stats { display: grid; grid-template-columns: repeat(2, 1fr); gap: .35rem .75rem; font-size: .8rem; color: var(--text-muted); }
.journey-item .stats span { display: flex; align-items: center; gap: .35rem; }
.journey-item .stats i { color: var(--primary-light); }

.empty-state { text-align: center; padding: 3rem 1rem; color: var(--text-muted); }
.empty-state .empty-icon {
    width: 72px; height: 72px;
    border-radius: 50%;
    background: var(--gradient-primary);
    color: #fff;
    display: inline-flex; align-items: center; justify-content: center;
    font-size: 2rem;
    margin-bottom: 1rem;
    box-shadow: var(--shadow);
}

.btn { border-radius: 12px; font-weight: 600; padding: .6rem 1.1rem; transition: all .15s ease; }
.btn-lg { padding: .85rem 1.25rem; border-radius: 14px; }
.btn-primary { background: var(--gradient-primary); border: 0; box-shadow: 0 4px 12px rgba(30, 64, 175, .25); }
.btn-primary:hover, .btn-primary:focus { background: var(--gradient-primary); transform: translateY(-1px); box-shadow: 0 6px 16px rgba(30, 64, 175, .35); }
.btn-success { background: var(--gradient-accent); border: 0; box-shadow: 0 4px 12px rgba(16, 185, 129, .3); }
.btn-success:hover { background: var(--gradient-accent); transform: translateY(-1px); }
.btn-outline-primary { border: 1.5px solid var(--primary); color: var(--primary); }
.btn-outline-primary:hover { background: var(--primary); border-color: var(--primary); }
.btn-outline-success { border: 1.5px solid var(--accent-dark); color: var(--accent-dark); }
.btn-outline-success:hover { background: var(--accent-dark); border-color: var(--accent-dark); }
.btn-outline-danger { border-width: 1.5px; }
.btn-outline-secondary { border-width: 1.5px; }

.fab-add {
    background: var(--gradient-accent);
    color: #fff;
    border-radius: 999px;
    padding: .55rem 1rem;
    font-weight: 600;
    font-size: .9rem;
    text-decoration: none;
    display: inline-flex; align-items: center; gap: .35rem;
    box-shadow: 0 4px 12px rgba(16, 185, 129, .3);
    transition: transform .15s ease;
}
.fab-add:hover { transform: translateY(-1px); color: #fff; }

.form-label { font-weight: 600; font-size: .85rem; color: var(--text); margin-bottom: .35rem; display: flex; align-items: center; gap: .35rem; }
.form-label i { color: var(--primary); font-size: .9rem; }
.form-control, .form-control-lg {
    border: 1.5px solid var(--border);
    border-radius: 12px;
    padding: .75rem 1rem;
    font-size: 1rem;
    background: var(--surface);
    transition: border-color .15s ease, box-shadow .15s ease;
}
.form-control-lg { font-size: 1.1rem; padding: .85rem 1rem; }
.form-control:focus { border-color: var(--primary-light); box-shadow: 0 0 0 3px rgba(59, 130, 246, .15); outline: none; }

@media (min-width: 992px) { .bottom-nav { display: none !important; } }
.bottom-nav {
    position: fixed;
    bottom: 0; left: 0; right: 0;
    background: var(--surface);
    box-shadow: 0 -4px 16px rgba(15, 23, 42, .06);
    display: flex;
    justify-content: space-around;
    padding: .5rem 0 calc(.5rem + env(safe-area-inset-bottom));
    z-index: 1030;
    border-top: 1px solid var(--border);
}
.bottom-nav a {
    flex: 1;
    text-align: center;
    color: var(--text-muted);
    font-size: .72rem;
    text-decoration: none;
    font-weight: 600;
    padding: .25rem;
    transition: color .15s ease;
    position: relative;
}
.bottom-nav a i { display: block; font-size: 1.4rem; margin-bottom: 2px; }
.bottom-nav a.active { color: var(--primary); }
.bottom-nav a.active::before {
    content: '';
    position: absolute;
    top: -.5rem; left: 50%;
    transform: translateX(-50%);
    width: 32px; height: 3px;
    background: var(--gradient-primary);
    border-radius: 0 0 4px 4px;
}
.bottom-nav a.add-btn { flex: 0; }
.bottom-nav a.add-btn .add-circle {
    width: 52px; height: 52px;
    border-radius: 50%;
    background: var(--gradient-accent);
    color: #fff;
    display: inline-flex; align-items: center; justify-content: center;
    font-size: 1.5rem;
    margin: -1.5rem auto .25rem;
    box-shadow: 0 6px 16px rgba(16, 185, 129, .4);
    transition: transform .15s ease;
}
.bottom-nav a.add-btn:hover .add-circle { transform: scale(1.05); }

.alert { border: 0; border-radius: 12px; border-left: 4px solid; font-weight: 500; }
.alert-success { background: rgba(16, 185, 129, .1); border-left-color: var(--accent-dark); color: #065f46; }
.alert-warning { background: rgba(251, 191, 36, .12); border-left-color: #f59e0b; color: #78350f; }
.alert-info    { background: rgba(59, 130, 246, .1); border-left-color: var(--primary); color: var(--primary-dark); }
.alert-danger  { background: rgba(239, 68, 68, .1); border-left-color: #dc2626; color: #7f1d1d; }

.text-money { font-variant-numeric: tabular-nums; }

@media (max-width: 575px) { .hero-card .value { font-size: 1.85rem; } }

@media (min-width: 992px) {
    .topbar { padding: 1.25rem 0; }
    .topbar .brand { font-size: 1.4rem; }
    .topbar .brand-icon { width: 42px; height: 42px; font-size: 1.25rem; }
    .hero-card { padding: 2rem 2.5rem; display: flex; align-items: center; justify-content: space-between; gap: 2rem; }
    .hero-card .value { font-size: 2.75rem; }
    .hero-card-cta { z-index: 1; position: relative; }
    .metric-card { padding: 1.5rem; }
    .metric-card .value { font-size: 1.75rem; }
    .metric-card .icon-pill { width: 40px; height: 40px; font-size: 1.1rem; }
    .section-title { font-size: .85rem; margin-top: 2rem; }
    .form-desktop-grid { display: grid; grid-template-columns: 1fr 1fr; gap: 1rem 1.5rem; }
    .form-desktop-grid .form-full { grid-column: 1 / -1; }
    .journey-list.grid { display: grid; grid-template-columns: repeat(auto-fill, minmax(320px, 1fr)); gap: .85rem; }
}
@media (min-width: 1200px) { .hero-card .value { font-size: 3rem; } }

.input-with-mic { position: relative; }
.input-with-mic .form-control { padding-right: 3rem; }
.mic-btn {
    position: absolute;
    right: 6px;
    top: 50%;
    transform: translateY(-50%);
    width: 38px; height: 38px;
    border-radius: 10px;
    border: 0;
    background: var(--gradient-primary);
    color: #fff;
    display: inline-flex; align-items: center; justify-content: center;
    font-size: 1rem;
    cursor: pointer;
    box-shadow: 0 2px 6px rgba(30, 64, 175, .25);
    transition: transform .15s ease, box-shadow .15s ease;
}
.mic-btn:hover { transform: translateY(-50%) scale(1.05); }
.mic-btn:active { transform: translateY(-50%) scale(0.95); }
.mic-btn.voice-disabled, .btn.voice-disabled { background: #cbd5e1 !important; color: #fff !important; cursor: not-allowed; box-shadow: none; }

.btn-voice-all {
    background: var(--gradient-accent);
    color: #fff;
    border: 0;
    border-radius: 12px;
    padding: .75rem 1rem;
    font-weight: 600;
    width: 100%;
    box-shadow: 0 4px 12px rgba(16, 185, 129, .3);
    transition: transform .15s ease;
}
.btn-voice-all:hover { transform: translateY(-1px); color: #fff; }

@keyframes voice-pulse {
    0%, 100% { transform: scale(1); box-shadow: 0 0 0 0 rgba(30, 64, 175, .5); }
    50%      { transform: scale(1.08); box-shadow: 0 0 0 18px rgba(30, 64, 175, 0); }
}
@keyframes voice-flash {
    0%   { background: rgba(16, 185, 129, .25); }
    100% { background: var(--surface); }
}
.voice-filled { animation: voice-flash 1.2s ease; }

.voice-overlay {
    position: fixed;
    inset: 0;
    background: rgba(15, 23, 42, .65);
    backdrop-filter: blur(6px);
    z-index: 2000;
    display: flex; align-items: center; justify-content: center;
    padding: 1rem;
}
.voice-overlay-card {
    background: var(--surface);
    border-radius: 20px;
    padding: 2rem 1.5rem;
    text-align: center;
    box-shadow: var(--shadow-lg);
    max-width: 320px;
    width: 100%;
}
.voice-pulse {
    width: 88px; height: 88px;
    border-radius: 50%;
    background: var(--gradient-primary);
    color: #fff;
    display: inline-flex; align-items: center; justify-content: center;
    font-size: 2.4rem;
    margin-bottom: 1rem;
    animation: voice-pulse 1.4s ease-in-out infinite;
}
.voice-text { font-weight: 600; color: var(--text); margin-bottom: .5rem; }

/* ─── Jornada em andamento ────────────────────────────────── */
.active-card {
    background: linear-gradient(135deg, #1f2937 0%, #0f1e3a 100%);
    color: #fff;
    border-radius: 1rem;
    padding: 1.25rem;
    box-shadow: var(--shadow);
    border-left: 5px solid var(--accent);
    position: relative;
    overflow: hidden;
}
.active-card .label {
    font-size: .72rem;
    letter-spacing: 1.5px;
    text-transform: uppercase;
    opacity: .9;
    font-weight: 700;
    color: var(--accent-light);
    display: flex;
    align-items: center;
    gap: .5rem;
    margin-bottom: .35rem;
}
.active-card .active-value {
    font-size: 1.15rem;
    font-weight: 700;
    color: #fff;
}
.active-card .small { color: rgba(255,255,255,.75) !important; }
.active-card .btn-success {
    background: var(--gradient-accent);
    border: 0;
    font-weight: 700;
    box-shadow: 0 4px 14px rgba(16, 185, 129, .35);
}

.journey-item.pending {
    border-left-color: var(--accent);
    background: linear-gradient(90deg, rgba(16,185,129,.06) 0%, var(--surface) 60%);
}
.amount-pending {
    background: rgba(16, 185, 129, .15);
    color: var(--accent-dark);
    padding: .3rem .7rem;
    border-radius: 999px;
    font-weight: 700;
    font-size: .8rem;
    display: inline-flex;
    align-items: center;
    gap: .4rem;
    border: 1px solid rgba(16, 185, 129, .3);
}

.pulse-dot {
    display: inline-block;
    width: 8px; height: 8px;
    border-radius: 50%;
    background: var(--accent);
    box-shadow: 0 0 0 0 rgba(16, 185, 129, .6);
    animation: pulse-dot 1.6s infinite;
}

/* ─── Heatmap dia × hora ──────────────────────────────────── */
.heatmap { padding: 1rem; margin-bottom: 1rem; }
.hm-scroll { overflow-x: auto; padding-bottom: .5rem; scrollbar-width: thin; }
.hm-scroll::-webkit-scrollbar { height: 6px; }
.hm-scroll::-webkit-scrollbar-thumb { background: var(--border); border-radius: 4px; }
.hm-grid {
    display: grid;
    grid-template-columns: 42px repeat(24, minmax(22px, 1fr));
    gap: 3px;
    min-width: 680px;
}
.hm-corner, .hm-hcol, .hm-day {
    font-size: .6rem;
    font-weight: 700;
    color: var(--text-muted);
    display: flex;
    align-items: center;
    justify-content: center;
    letter-spacing: .3px;
    font-variant-numeric: tabular-nums;
}
.hm-day {
    justify-content: flex-end;
    padding-right: .35rem;
    text-transform: uppercase;
}
.hm-hcol {
    height: 18px;
    color: var(--text);
    font-weight: 600;
}
.hm-cell {
    aspect-ratio: 1;
    border-radius: 4px;
    transition: transform .15s ease;
    cursor: help;
    border: 1px solid rgba(15, 30, 58, .03);
}
.hm-cell:hover { transform: scale(1.25); z-index: 5; position: relative; box-shadow: 0 4px 12px rgba(15, 30, 58, .2); }
.hm-cell.best {
    border: 2px solid var(--accent);
    box-shadow: 0 0 0 2px rgba(16, 185, 129, .25);
    animation: best-pulse 2s ease-in-out infinite;
}
@keyframes best-pulse {
    0%, 100% { box-shadow: 0 0 0 2px rgba(16, 185, 129, .25); }
    50%      { box-shadow: 0 0 0 4px rgba(16, 185, 129, .15); }
}
.hm-legend {
    display: flex;
    align-items: center;
    gap: .5rem;
    margin-top: .85rem;
    font-size: .7rem;
    font-weight: 700;
}
.hm-leg-label { white-space: nowrap; }
.hm-leg-bad   { color: #dc2626; }
.hm-leg-mid   { color: #d97706; }
.hm-leg-good  { color: var(--accent-dark); }
.hm-legend-bar {
    flex: 1;
    height: 10px;
    border-radius: 5px;
    background: linear-gradient(90deg, #ef4444 0%, #fbbf24 50%, #10b981 100%);
}
.hm-legend-max {
    margin-top: .35rem;
    font-size: .7rem;
    color: var(--text-muted);
    text-align: right;
    font-weight: 600;
}
.hm-empty, .heatmap-empty {
    background: var(--surface);
    border-radius: 14px;
    padding: 1.5rem 1rem;
    text-align: center;
    color: var(--text-muted);
    font-size: .9rem;
    margin-bottom: 1rem;
    box-shadow: var(--shadow-sm);
}
.heatmap-empty i { font-size: 1.6rem; display: block; margin-bottom: .5rem; color: var(--primary-light); }
.hm-insights {
    display: grid;
    grid-template-columns: 1fr;
    gap: .65rem;
    margin-top: 1rem;
}
.hm-insight {
    display: flex;

<script>
/* ─── voice.js ─────────────────────────────────────────────── */
(function () {
    const SR = window.SpeechRecognition || window.webkitSpeechRecognition;
    const supported = !!SR;
    function setUnsupported() {
        document.querySelectorAll('[data-voice-target], [data-voice-fill-all]').forEach(b => {
            b.disabled = true;
            b.title = 'Reconhecimento de voz não suportado neste navegador. Use Chrome/Edge.';
            b.classList.add('voice-disabled');
        });
    }
    function parseNumero(text) {
        if (!text) return null;
        let t = text.toLowerCase().trim();
        t = t.replace(/r\$|reais|real|km|quilômetros?|quilometros?/gi, '');
        t = t.replace(/\bvírgula\b|\bvirgula\b/g, ',');
        t = t.replace(/\bponto\b/g, '.');
        t = t.replace(/[^\d,.-]/g, '').trim();
        if (!t) return null;
        if (t.includes(',')) { t = t.replace(/\./g, '').replace(',', '.'); }
        const n = parseFloat(t);
        return isNaN(n) ? null : n;
    }
    function parseHora(text) {
        if (!text) return null;
        const t = text.toLowerCase().trim();
        let m = t.match(/(\d{1,2})[:hH](\d{2})/);
        if (m) return pad(m[1]) + ':' + pad(m[2]);
        m = t.match(/(\d{1,2})\s*(?:horas?\s*)?(?:e\s+(meia|um quarto|\d{1,2}))?/);
        if (m) {
            const h = parseInt(m[1], 10);
            let min = 0;
            if (m[2] === 'meia') min = 30;
            else if (m[2] === 'um quarto') min = 15;
            else if (m[2]) min = parseInt(m[2], 10) || 0;
            if (h >= 0 && h <= 23 && min >= 0 && min < 60) return pad(h) + ':' + pad(min);
        }
        return null;
    }
    function pad(n) { return String(n).padStart(2, '0'); }
    function novoReconhecimento() {
        const r = new SR();
        r.lang = 'pt-BR';
        r.interimResults = false;
        r.maxAlternatives = 1;
        r.continuous = false;
        return r;
    }
    function escutar(prompt) {
        return new Promise((resolve, reject) => {
            const r = novoReconhecimento();
            const overlay = mostrarOverlay(prompt || 'Fale agora…');
            let resolved = false;
            r.onresult = (ev) => { resolved = true; const txt = ev.results[0][0].transcript; fecharOverlay(overlay); resolve(txt); };
            r.onerror = (ev) => { fecharOverlay(overlay); reject(ev.error); };
            r.onend = () => { if (!resolved) { fecharOverlay(overlay); resolve(null); } };
            try { r.start(); } catch (e) { fecharOverlay(overlay); reject(e); }
        });
    }
    function mostrarOverlay(texto) {
        const div = document.createElement('div');
        div.className = 'voice-overlay';
        div.innerHTML = `
            <div class="voice-overlay-card">
                <div class="voice-pulse"><i class="bi bi-mic-fill"></i></div>
                <div class="voice-text">${texto}</div>
                <button type="button" class="btn btn-sm btn-outline-secondary mt-2 voice-cancel">Cancelar</button>
            </div>`;
        document.body.appendChild(div);
        div.querySelector('.voice-cancel').addEventListener('click', () => fecharOverlay(div));
        return div;
    }
    function fecharOverlay(div) { if (div && div.parentNode) div.parentNode.removeChild(div); }
    function flashCampo(input) { input.classList.add('voice-filled'); setTimeout(() => input.classList.remove('voice-filled'), 1200); }
    function aplicar(input, texto) {
        if (texto == null) return false;
        const tipo = input.dataset.voiceType || input.type || 'text';
        if (tipo === 'number' || tipo === 'decimal') {
            const n = parseNumero(texto);
            if (n != null) { input.value = n; flashCampo(input); return true; }
        } else if (tipo === 'time') {
            const h = parseHora(texto);
            if (h) { input.value = h; flashCampo(input); return true; }
        } else { input.value = texto; flashCampo(input); return true; }
        return false;
    }
    if (!supported) { setUnsupported(); }
    else {
        document.addEventListener('click', async (e) => {
            const btn = e.target.closest('[data-voice-target]');
            if (!btn) return;
            e.preventDefault();
            const input = document.getElementById(btn.dataset.voiceTarget);
            if (!input) return;
            try {
                const txt = await escutar(btn.dataset.voicePrompt || 'Fale o valor…');
                if (!aplicar(input, txt)) alert('Não consegui entender. Tente novamente.');
            } catch (err) {
                console.warn('Voz erro:', err);
                if (err === 'not-allowed') alert('Permissão de microfone negada.');
            }
        });
        document.addEventListener('click', async (e) => {
            const btn = e.target.closest('[data-voice-fill-all]');
            if (!btn) return;
            e.preventDefault();
            const sequencia = [
                { id: 'id_data',         prompt: 'Diga a data (ou pule).',     skip: true },
                { id: 'id_hora_inicio',  prompt: 'Hora de início. Ex: oito horas.' },
                { id: 'id_hora_fim',     prompt: 'Hora de término.' },
                { id: 'id_km_inicial',   prompt: 'KM inicial.' },
                { id: 'id_km_final',     prompt: 'KM final.' },
                { id: 'id_valor_bruto',  prompt: 'Valor bruto em reais.' },
            ];
            for (const passo of sequencia) {
                const input = document.getElementById(passo.id);
                if (!input) continue;
                if (passo.skip && input.value) continue;
                try {
                    const txt = await escutar(passo.prompt);
                    if (txt) aplicar(input, txt);
                    await new Promise(r => setTimeout(r, 400));
                } catch (err) { console.warn('Voz erro:', err); break; }
            }
        });
    }
    window.__voiceSupported = supported;
})();

/* ─── app.js ───────────────────────────────────────────────── */
(function () {
'use strict';

const KEY = 'lucrometro:jornadas:v1';

function load() {
    try { const raw = localStorage.getItem(KEY); return raw ? JSON.parse(raw) : []; }
    catch { return []; }
}
function save(list) { localStorage.setItem(KEY, JSON.stringify(list)); }
function nextId(list) { return list.reduce((m, j) => Math.max(m, j.id || 0), 0) + 1; }

function q2(n) { return Math.round((+n || 0) * 100) / 100; }
function totalKm(ki, kf) { const d = (+kf) - (+ki); return q2(d > 0 ? d : 0); }
function totalHoras(hi, hf) {
    if (!hi || !hf) return 0;
    const [h1, m1] = hi.split(':').map(Number);
    const [h2, m2] = hf.split(':').map(Number);
    let mins = (h2 * 60 + m2) - (h1 * 60 + m1);
    if (mins <= 0) mins += 24 * 60;
    return q2(mins / 60);
}
function precoPorKm(valor, km)     { return km > 0 ? q2(valor / km) : 0; }
function precoPorHora(valor, horas){ return horas > 0 ? q2(valor / horas) : 0; }
function formatarHorasDecimais(h) {
    const inteiro = Math.floor(h);
    const min = Math.round((h - inteiro) * 60);
    return `${inteiro}h ${String(min).padStart(2, '0')}min`;
}
function isEmAndamento(j) {
    return !j.hora_fim || j.km_final == null || j.km_final === '' || j.valor_bruto == null || j.valor_bruto === '';
}
function enriquecer(j) {
    const em_andamento = isEmAndamento(j);
    const total_km = em_andamento ? 0 : totalKm(j.km_inicial, j.km_final);
    const total_horas = em_andamento ? 0 : totalHoras(j.hora_inicio, j.hora_fim);
    return { ...j, em_andamento, total_km, total_horas,
        preco_por_km: precoPorKm(+j.valor_bruto, total_km),
        preco_por_hora: precoPorHora(+j.valor_bruto, total_horas),
        total_horas_formatado: formatarHorasDecimais(total_horas) };
}
// Distribui jornadas em uma grade [dia da semana × hora do dia], devolvendo
// R$/hora médio por célula, melhor célula, melhor dia e melhor hora.
function gerarHeatmap(jornadas) {
    const grid = Array.from({ length: 7 }, () =>
        Array.from({ length: 24 }, () => ({ horas: 0, valor: 0, rh: 0 })));
    const porDia  = Array.from({ length: 7 },  () => ({ horas: 0, valor: 0, rh: 0 }));
    const porHora = Array.from({ length: 24 }, () => ({ horas: 0, valor: 0, rh: 0 }));

    for (const j of jornadas) {
        if (j.em_andamento) continue;
        if (!j.hora_inicio || !j.hora_fim || j.valor_bruto == null) continue;
        const baseDia = new Date(j.data + 'T00:00:00').getDay();
        const [h1, m1] = j.hora_inicio.split(':').map(Number);
        const [h2, m2] = j.hora_fim.split(':').map(Number);
        let inicioMin = h1 * 60 + m1;
        let fimMin = h2 * 60 + m2;
        if (fimMin <= inicioMin) fimMin += 24 * 60;
        const totalMin = fimMin - inicioMin;
        if (totalMin <= 0) continue;
        const valorPorMin = (+j.valor_bruto) / totalMin;
        let cur = inicioMin;
        while (cur < fimMin) {
            const hAbs = Math.floor(cur / 60);
            const horaAtual = hAbs % 24;
            const diaAtual = (baseDia + Math.floor(hAbs / 24)) % 7;
            const proximo = Math.min(fimMin, (hAbs + 1) * 60);
            const minCell = proximo - cur;
            const horasCell = minCell / 60;
            const valorCell = valorPorMin * minCell;
            grid[diaAtual][horaAtual].horas += horasCell;
            grid[diaAtual][horaAtual].valor += valorCell;
            porDia[diaAtual].horas  += horasCell; porDia[diaAtual].valor  += valorCell;
            porHora[horaAtual].horas += horasCell; porHora[horaAtual].valor += valorCell;
            cur = proximo;
        }
    }

    let maxRh = 0, melhorCell = null;
    for (let d = 0; d < 7; d++) {
        for (let h = 0; h < 24; h++) {
            const c = grid[d][h];
            c.rh = c.horas > 0 ? c.valor / c.horas : 0;
            if (c.rh > maxRh) { maxRh = c.rh; melhorCell = { dia: d, hora: h, rh: c.rh, horas: c.horas }; }
        }
    }
    let melhorDia = null, melhorHora = null;
    porDia.forEach((c, i)  => { c.rh = c.horas > 0 ? c.valor / c.horas : 0;
        if (!melhorDia || c.rh > melhorDia.rh)  melhorDia  = { dia: i,  rh: c.rh, horas: c.horas }; });
    porHora.forEach((c, i) => { c.rh = c.horas > 0 ? c.valor / c.horas : 0;
        if (!melhorHora || c.rh > melhorHora.rh) melhorHora = { hora: i, rh: c.rh, horas: c.horas }; });

    return { grid, maxRh, melhorCell, melhorDia, melhorHora };
}

function resumoDashboard(jornadas) {
    let bruto = 0, km = 0, horas = 0, qtd = 0;
    for (const j of jornadas) {
        if (j.em_andamento) continue;
        bruto += +j.valor_bruto || 0;
        km    += +j.total_km    || 0;
        horas += +j.total_horas || 0;
        qtd++;
    }
    return { total_jornadas: qtd, total_bruto: q2(bruto),
        total_km: q2(km), total_horas: q2(horas),
        media_por_km: precoPorKm(bruto, km), media_por_hora: precoPorHora(bruto, horas) };
}

const PERIODOS = { hoje: 'Hoje', semana: 'Últimos 7 dias', mes: 'Últimos 30 dias', tudo: 'Tudo' };

function filtrarPeriodo(list, periodo) {
    const hoje = new Date(); hoje.setHours(0, 0, 0, 0);
    function dias(n) { const d = new Date(hoje); d.setDate(d.getDate() - n); return d; }
    return list.filter(j => {
        if (periodo === 'tudo') return true;
        const d = new Date(j.data + 'T00:00:00');
        if (periodo === 'hoje')   return d.getTime() === hoje.getTime();
        if (periodo === 'semana') return d >= dias(6);
        if (periodo === 'mes')    return d >= dias(29);
        return true;
    });
}

function fmtBR(n) { return (+n).toFixed(2).replace('.', ','); }
function fmtData(s) { const [y, m, d] = s.split('-'); return `${d}/${m}/${y}`; }
function escapeHtml(s) { return String(s ?? '').replace(/[&<>"']/g, c => ({'&':'&amp;','<':'&lt;','>':'&gt;','"':'&quot;',"'":'&#39;'}[c])); }
function todayISO() {
    const d = new Date();
    return `${d.getFullYear()}-${String(d.getMonth()+1).padStart(2,'0')}-${String(d.getDate()).padStart(2,'0')}`;
}

function alerta(msg, tipo='success') {
    const el = document.createElement('div');
    el.className = `alert alert-${tipo} alert-dismissible fade show`;
    el.innerHTML = `<i class="bi bi-check-circle-fill me-2"></i>${escapeHtml(msg)}<button type="button" class="btn-close" data-bs-dismiss="alert"></button>`;
    document.getElementById('alerts').appendChild(el);
    setTimeout(() => el.classList.remove('show'), 3000);
    setTimeout(() => el.remove(), 3500);
}

function parseHash() {
    const h = location.hash.replace(/^#/, '') || '/';
    const parts = h.split('?')[0].split('/').filter(Boolean);
    return { route: parts[0] || 'dashboard', param: parts[1] };
}
function setActiveLinks(route) {
    document.querySelectorAll('[data-route]').forEach(a => {
        a.classList.toggle('active', a.dataset.route === route);
    });
}

function render() {
    const { route, param } = parseHash();
    const jornadas = load().map(enriquecer);
    const view = document.getElementById('view');
    const action = document.getElementById('topbar-action');
    action.innerHTML = '';

    if (!route || (route === 'dashboard' && !param)) {
        renderDashboard(view, action, jornadas); setActiveLinks('dashboard');
    } else if (route === 'historico') {
        renderHistorico(view, action, jornadas); setActiveLinks('historico');
    } else if (route === 'nova') {
        renderForm(view, action, null); setActiveLinks('nova');
    } else if (route === 'editar' && param) {
        const j = jornadas.find(x => x.id == param);
        if (!j) { location.hash = '#/historico'; return; }
        renderForm(view, action, j); setActiveLinks('historico');
    } else if (route === 'excluir' && param) {
        const j = jornadas.find(x => x.id == param);
        if (!j) { location.hash = '#/historico'; return; }
        renderExcluir(view, j); setActiveLinks('historico');
    } else { location.hash = '#/'; }
    window.scrollTo({ top: 0, behavior: 'instant' });
}
window.addEventListener('hashchange', render);

const DIAS_SEMANA = ['Dom', 'Seg', 'Ter', 'Qua', 'Qui', 'Sex', 'Sáb'];

function renderHeatmap(jornadas) {
    const { grid, maxRh, melhorCell, melhorDia, melhorHora } = gerarHeatmap(jornadas);
    if (maxRh === 0) {
        return `
            <div class="section-title"><span>Heatmap dia × hora</span></div>
            <div class="heatmap-empty">
                <i class="bi bi-grid-3x3"></i>
                Conclua algumas jornadas para ver seus melhores horários aqui.
            </div>`;
    }
    // Escala vermelho (ruim) → amarelo (médio) → verde (excelente)
    const cor = (rh) => {
        if (rh <= 0) return '#eef2f7';
        const t = Math.min(1, rh / maxRh);
        let r, g, b;
        if (t < 0.5) {
            const k = t * 2;                              // 0..1 dentro da metade
            r = Math.round(239 + (251 - 239) * k);
            g = Math.round( 68 + (191 -  68) * k);
            b = Math.round( 68 + ( 36 -  68) * k);
        } else {
            const k = (t - 0.5) * 2;
            r = Math.round(251 + ( 16 - 251) * k);
            g = Math.round(191 + (185 - 191) * k);
            b = Math.round( 36 + (129 -  36) * k);
        }
        return `rgb(${r}, ${g}, ${b})`;
    };

    let cabec = '<div class="hm-corner"></div>';
    for (let h = 0; h < 24; h++) {
        cabec += `<div class="hm-hcol">${String(h).padStart(2, '0')}</div>`;
    }
    let linhas = '';
    for (let d = 0; d < 7; d++) {
        linhas += `<div class="hm-day">${DIAS_SEMANA[d]}</div>`;
        for (let h = 0; h < 24; h++) {
            const c = grid[d][h];
            const isBest = melhorCell && melhorCell.dia === d && melhorCell.hora === h;
            const tip = c.horas > 0
                ? `${DIAS_SEMANA[d]} ${String(h).padStart(2, '0')}h — R$ ${fmtBR(c.rh)}/h (${c.horas.toFixed(1)} h)`
                : `${DIAS_SEMANA[d]} ${String(h).padStart(2, '0')}h — sem dados`;
            linhas += `<div class="hm-cell${isBest ? ' best' : ''}" style="background:${cor(c.rh)}" title="${tip}"></div>`;
        }
    }
    const insights = `
        <div class="hm-insights">
            <div class="hm-insight">
                <i class="bi bi-trophy-fill"></i>
                <div>
                    <div class="hm-i-label">Melhor turno</div>
                    <strong>${DIAS_SEMANA[melhorCell.dia]} às ${String(melhorCell.hora).padStart(2, '0')}h</strong>
                    <span class="hm-i-rh">R$ ${fmtBR(melhorCell.rh)}/h</span>
                </div>
            </div>
            <div class="hm-insight">
                <i class="bi bi-calendar-week-fill"></i>
                <div>
                    <div class="hm-i-label">Melhor dia</div>
                    <strong>${DIAS_SEMANA[melhorDia.dia]}</strong>
                    <span class="hm-i-rh">R$ ${fmtBR(melhorDia.rh)}/h</span>
                </div>
            </div>
            <div class="hm-insight">
                <i class="bi bi-clock-fill"></i>
                <div>
                    <div class="hm-i-label">Melhor horário</div>
                    <strong>${String(melhorHora.hora).padStart(2, '0')}h</strong>
                    <span class="hm-i-rh">R$ ${fmtBR(melhorHora.rh)}/h</span>
                </div>
            </div>
        </div>`;

    return `
        <div class="section-title">
            <span>Heatmap dia × hora</span>
            <span class="small fw-normal" style="color: var(--text-muted);">R$/hora médio</span>
        </div>
        <div class="heatmap card">
            <div class="hm-scroll">
                <div class="hm-grid">
                    ${cabec}
                    ${linhas}
                </div>
            </div>
            <div class="hm-legend">
                <span class="hm-leg-label hm-leg-bad">● Ruim</span>
                <span class="hm-legend-bar"></span>
                <span class="hm-leg-label hm-leg-mid">● Médio</span>
                <span class="hm-legend-bar"></span>
                <span class="hm-leg-label hm-leg-good">● Excelente</span>
            </div>
            <div class="hm-legend-max">Pico: R$ ${fmtBR(maxRh)}/h</div>
            ${insights}
        </div>`;
}

        </div>` : `
        <div class="row-top">
            <span class="date"><i class="bi bi-calendar3"></i>${fmtData(j.data)}</span>
            <span class="amount text-money">R$ ${fmtBR(j.valor_bruto)}</span>
        </div>
        <div class="stats">
            <span><i class="bi bi-signpost"></i> ${fmtBR(j.total_km)} km</span>
            <span><i class="bi bi-clock"></i> ${j.total_horas_formatado}</span>

                    <i class="bi bi-mic-fill"></i> Preencher tudo por voz
                </button>
                <div class="card p-3 p-md-4 p-lg-5">
                    <form id="form-jornada">
                        <div class="form-desktop-grid">
                            <div class="mb-3 form-full">
                                <label for="id_data" class="form-label"><i class="bi bi-calendar3"></i> Data</label>
                                <input type="date" id="id_data" name="data" class="form-control form-control-lg" required value="${j.data}">
                            </div>

                            ${campoTime('hora_fim', 'Término', 'stop-circle', j.hora_fim, 'Hora de término.', false)}
                            ${campoNumero('km_inicial', 'KM inicial', 'signpost', j.km_inicial, '0.1', 'KM inicial.', true)}
                            ${campoNumero('km_final', 'KM final', 'signpost-fill', j.km_final, '0.1', 'KM final.', false)}
                            <div class="mb-4 form-full">
                                <label for="id_valor_bruto" class="form-label"><i class="bi bi-cash-coin"></i> Valor bruto (R$) <small class="text-muted fw-normal">(opcional)</small></label>
                                <div class="input-with-mic">
                                    <input type="number" id="id_valor_bruto" name="valor_bruto" class="form-control form-control-lg"
                                           inputmode="decimal" step="0.01" min="0" value="${j.valor_bruto ?? ''}" placeholder="Ex.: 250.00">
                                    <button type="button" class="mic-btn" data-voice-target="id_valor_bruto" data-voice-type="number"
                                            data-voice-prompt="Valor bruto em reais." aria-label="Ditar valor"><i class="bi bi-mic-fill"></i></button>
                                </div>
                                <div class="small text-muted mt-2">
                                    <i class="bi bi-info-circle"></i>
                                    Você pode salvar agora só com data, hora de início e KM inicial. Os demais campos podem ser preenchidos quando terminar a jornada.
                                </div>
                            </div>
                        </div>
                        <div id="form-errors"></div>
                        <div class="d-flex flex-column flex-lg-row gap-2 justify-content-lg-end">
                            <a href="${editando ? '#/historico' : '#/'}" class="btn btn-outline-secondary order-lg-1">Cancelar</a>
                            <button type="submit" class="btn btn-success btn-lg order-lg-2 px-lg-5">
                                <i class="bi bi-check-lg"></i>
                                ${editando && jornada.em_andamento ? 'Finalizar jornada'
                                    : editando ? 'Atualizar jornada'
                                    : 'Salvar jornada'}
                            </button>
                        </div>
                    </form>
                </div>
            </div>
        </div>`;
    document.getElementById('form-jornada').addEventListener('submit', e => {
        e.preventDefault();
        const hora_fim_raw = byId('id_hora_fim').value;
        const km_final_raw = byId('id_km_final').value;
        const valor_raw    = byId('id_valor_bruto').value;
        const data = {
            data: byId('id_data').value,
            hora_inicio: byId('id_hora_inicio').value,
            hora_fim: hora_fim_raw || null,
            km_inicial: parseFloat(byId('id_km_inicial').value),
            km_final: km_final_raw === '' ? null : parseFloat(km_final_raw),
            valor_bruto: valor_raw === '' ? null : parseFloat(valor_raw),
        };
        const errors = validar(data);
        const errBox = byId('form-errors');
        if (errors.length) {
            errBox.innerHTML = `<div class="alert alert-danger"><i class="bi bi-exclamation-triangle-fill me-2"></i>${errors.join('<br>')}</div>`;
            return;
        }
        errBox.innerHTML = '';
        const list = load();
        const concluida = data.hora_fim && data.km_final != null && data.valor_bruto != null;
        const msg = editando
            ? (concluida ? 'Jornada finalizada!' : 'Jornada atualizada.')
            : (concluida ? 'Jornada registrada com sucesso!' : 'Jornada iniciada! Finalize quando parar de trabalhar.');
        if (editando) {
            const idx = list.findIndex(x => x.id === jornada.id);
            list[idx] = { id: jornada.id, ...data };
        } else {
            list.push({ id: nextId(list), ...data });
        }
        save(list); alerta(msg); location.hash = concluida ? '#/' : '#/historico';
    });
}

function campoTime(name, label, icon, val, prompt, required) {
    return `
        <div class="mb-3">
            <label for="id_${name}" class="form-label"><i class="bi bi-${icon}"></i> ${label}${required ? '' : ' <small class="text-muted fw-normal">(opcional)</small>'}</label>
            <div class="input-with-mic">
                <input type="time" id="id_${name}" name="${name}" class="form-control form-control-lg" ${required ? 'required' : ''} value="${val || ''}">
                <button type="button" class="mic-btn" data-voice-target="id_${name}" data-voice-type="time"
                        data-voice-prompt="${prompt}" aria-label="Ditar ${label}"><i class="bi bi-mic-fill"></i></button>
            </div>
        </div>`;
}
function campoNumero(name, label, icon, val, step, prompt, required) {
    return `
        <div class="mb-3">
            <label for="id_${name}" class="form-label"><i class="bi bi-${icon}"></i> ${label}${required ? '' : ' <small class="text-muted fw-normal">(opcional)</small>'}</label>
            <div class="input-with-mic">
                <input type="number" id="id_${name}" name="${name}" class="form-control form-control-lg"
                       inputmode="decimal" step="${step}" min="0" ${required ? 'required' : ''} value="${val ?? ''}" placeholder="Ex.: 12345">
                <button type="button" class="mic-btn" data-voice-target="id_${name}" data-voice-type="number"
                        data-voice-prompt="${prompt}" aria-label="Ditar ${label}"><i class="bi bi-mic-fill"></i></button>
            </div>
        </div>`;
}
function byId(id) { return document.getElementById(id); }

function validar(d) {
    const erros = [];
    if (!d.data) erros.push('Informe a data.');
    if (!d.hora_inicio) erros.push('Informe a hora de início.');
    if (isNaN(d.km_inicial)) erros.push('Informe o KM inicial.');
    // hora_fim, km_final e valor_bruto são opcionais (jornada em andamento)
    if (d.km_final != null && !isNaN(d.km_final) && d.km_final < d.km_inicial) erros.push('KM final não pode ser menor que KM inicial.');
    if (d.valor_bruto != null && !isNaN(d.valor_bruto) && d.valor_bruto < 0) erros.push('Valor bruto não pode ser negativo.');
    return erros;
}

function renderExcluir(view, j) {

                    <a href="#/historico" class="btn btn-outline-secondary">Cancelar</a>
                </div>

        </div>`;
    document.getElementById('btn-confirm-delete').addEventListener('click', () => {
        const list = load().filter(x => x.id !== j.id);
        save(list); alerta('Jornada excluída.'); location.hash = '#/historico';
    });
}

function abrirModalExport() {
    if (document.getElementById('export-modal')) return;
    const html = `
        <div class="export-backdrop" id="export-modal">
            <div class="export-card">
                <button type="button" class="export-close" aria-label="Fechar">&times;</button>
                <h2><i class="bi bi-download"></i> Exportar histórico</h2>
                <p class="sub">Escolha o período e o formato do relatório.</p>

                <div class="export-section-label">Período</div>
                <div class="export-period">
                    ${Object.entries(EXPORT_PERIODOS).map(([k, l], i) => `
                        <label>
                            <input type="radio" name="exp-periodo" value="${k}" ${i === 2 ? 'checked' : ''}>
                            <span>${l}</span>
                        </label>
                    `).join('')}
                </div>

                <div class="export-section-label">Formato</div>
                <div class="export-formats">
                    <button type="button" class="export-fmt-btn fmt-pdf"   data-formato="pdf">
                        <i class="bi bi-file-earmark-pdf-fill"></i>
                        <span class="fmt-text">PDF<small>Relatório imprimível</small></span>
                    </button>
                    <button type="button" class="export-fmt-btn fmt-excel" data-formato="excel">
                        <i class="bi bi-file-earmark-spreadsheet-fill"></i>
                        <span class="fmt-text">Excel<small>Planilha .xlsx</small></span>
                    </button>
                    <button type="button" class="export-fmt-btn fmt-word"  data-formato="word">
                        <i class="bi bi-file-earmark-word-fill"></i>
                        <span class="fmt-text">Word<small>Documento .doc</small></span>
                    </button>
                    <button type="button" class="export-fmt-btn fmt-json"  data-formato="json">
                        <i class="bi bi-filetype-json"></i>
                        <span class="fmt-text">JSON<small>Backup / importar</small></span>
                    </button>
                </div>
            </div>
        </div>`;
    document.body.insertAdjacentHTML('beforeend', html);
    const backdrop = document.getElementById('export-modal');
    const fechar = () => backdrop.remove();
    backdrop.querySelector('.export-close').addEventListener('click', fechar);
    backdrop.addEventListener('click', e => { if (e.target === backdrop) fechar(); });
    backdrop.querySelectorAll('[data-formato]').forEach(btn => {
        btn.addEventListener('click', () => {
            const periodo = backdrop.querySelector('input[name="exp-periodo"]:checked').value;
            executarExport(periodo, btn.dataset.formato);
            fechar();
        });
    });
}

function dadosParaExport(periodo) {
    const todas = load().map(enriquecer);
    const filtradas = filtrarPeriodo(todas, periodo)
        .sort((a, b) => (a.data + a.hora_inicio).localeCompare(b.data + b.hora_inicio));
    return { jornadas: filtradas, resumo: resumoDashboard(filtradas), periodoLabel: EXPORT_PERIODOS[periodo] };
}

function executarExport(periodo, formato) {
    const { jornadas, resumo, periodoLabel } = dadosParaExport(periodo);
    if (!jornadas.length) {
        alerta('Nenhuma jornada nesse período para exportar.', 'warning');
        return;
    }
    const stamp = todayISO();
    const fname = `rota-certa-${NOMES_PERIODOS[periodo]}-${stamp}`;
    try {
        if (formato === 'pdf')   exportarPDF(jornadas, resumo, periodoLabel, fname);
        if (formato === 'excel') exportarExcel(jornadas, resumo, periodoLabel, fname);
        if (formato === 'word')  exportarWord(jornadas, resumo, periodoLabel, fname);
        if (formato === 'json')  exportarJSON(jornadas, fname);
        alerta(`Arquivo ${formato.toUpperCase()} exportado com sucesso.`);
    } catch (err) {
        console.error(err);
        alerta('Erro ao gerar arquivo: ' + (err.message || err), 'danger');
    }
}

function linhaJornada(j) {
    return [
        fmtData(j.data),
        j.hora_inicio || '—',
        j.hora_fim || '—',
        j.em_andamento ? '—' : j.total_horas_formatado,
        fmtBR(j.km_inicial),
        j.km_final != null ? fmtBR(j.km_final) : '—',
        j.em_andamento ? '—' : fmtBR(j.total_km),
        j.valor_bruto != null ? 'R$ ' + fmtBR(j.valor_bruto) : '—',
        j.em_andamento ? '—' : 'R$ ' + fmtBR(j.preco_por_km),
        j.em_andamento ? '—' : 'R$ ' + fmtBR(j.preco_por_hora),
    ];
}
const HEADER_COLUNAS = ['Data', 'Início', 'Fim', 'Horas', 'KM ini.', 'KM fim', 'Total km', 'Valor bruto', 'R$/km', 'R$/h'];

function exportarPDF(jornadas, resumo, periodoLabel, fname) {
    if (!window.jspdf) throw new Error('Biblioteca PDF ainda carregando, tente de novo em 1s.');
    const { jsPDF } = window.jspdf;
    const doc = new jsPDF({ orientation: 'landscape', unit: 'pt', format: 'a4' });
    const W = doc.internal.pageSize.getWidth();

    // Cabeçalho colorido
    doc.setFillColor(15, 30, 58);
    doc.rect(0, 0, W, 70, 'F');
    doc.setTextColor(255, 255, 255);
    doc.setFont('helvetica', 'bold');
    doc.setFontSize(20);
    doc.text('Rota Certa', 30, 35);
    doc.setFont('helvetica', 'normal');
    doc.setFontSize(10);
    doc.text('Histórico de jornadas · ' + periodoLabel, 30, 52);
    doc.setFontSize(8);
    doc.text('Gerado em ' + new Date().toLocaleString('pt-BR'), 30, 64);

    // Resumo
    doc.setTextColor(31, 41, 55);
    doc.setFontSize(11);
    doc.setFont('helvetica', 'bold');
    doc.text(`R$ ${fmtBR(resumo.total_bruto)}`, 30, 100);
    doc.setFont('helvetica', 'normal');
    doc.setFontSize(9);
    doc.setTextColor(75, 85, 99);
    doc.text(`${resumo.total_jornadas} jornadas · ${fmtBR(resumo.total_km)} km · ${fmtBR(resumo.total_horas)} h`, 30, 115);
    doc.text(`Médias: R$ ${fmtBR(resumo.media_por_km)}/km · R$ ${fmtBR(resumo.media_por_hora)}/h`, 30, 128);

    doc.autoTable({
        startY: 145,
        head: [HEADER_COLUNAS],
        body: jornadas.map(linhaJornada),
        styles: { fontSize: 9, cellPadding: 5 },
        headStyles: { fillColor: [15, 30, 58], textColor: 255, fontStyle: 'bold' },
        alternateRowStyles: { fillColor: [243, 244, 246] },
        margin: { left: 30, right: 30 },
        didDrawPage: (data) => {
            const pageH = doc.internal.pageSize.getHeight();
            doc.setFontSize(8); doc.setTextColor(107, 114, 128);
            doc.text(`Página ${doc.internal.getNumberOfPages()}`, W - 30, pageH - 15, { align: 'right' });
            doc.text('https://claytonapps.github.io/Rota-Certa/', 30, pageH - 15);
        },
    });

    doc.save(fname + '.pdf');
}

function exportarExcel(jornadas, resumo, periodoLabel, fname) {
    if (!window.XLSX) throw new Error('Biblioteca Excel ainda carregando, tente de novo em 1s.');
    const wb = XLSX.utils.book_new();
    const aoa = [
        ['Rota Certa — Histórico de jornadas'],
        ['Período: ' + periodoLabel],
        ['Gerado em: ' + new Date().toLocaleString('pt-BR')],
        [],
        ['Total bruto', +resumo.total_bruto, 'Total km', +resumo.total_km, 'Total horas', +resumo.total_horas],
        ['Média R$/km', +resumo.media_por_km, 'Média R$/h', +resumo.media_por_hora, 'Jornadas', resumo.total_jornadas],
        [],
        HEADER_COLUNAS,
        ...jornadas.map(j => [
            fmtData(j.data),
            j.hora_inicio || '',
            j.hora_fim || '',
            j.em_andamento ? '' : +j.total_horas,
            +j.km_inicial,
            j.km_final != null ? +j.km_final : '',
            j.em_andamento ? '' : +j.total_km,
            j.valor_bruto != null ? +j.valor_bruto : '',
            j.em_andamento ? '' : +j.preco_por_km,
            j.em_andamento ? '' : +j.preco_por_hora,
        ]),
    ];
    const ws = XLSX.utils.aoa_to_sheet(aoa);
    ws['!cols'] = [
        { wch: 12 }, { wch: 8 }, { wch: 8 }, { wch: 10 }, { wch: 11 },
        { wch: 11 }, { wch: 10 }, { wch: 13 }, { wch: 10 }, { wch: 10 },
    ];
    ws['!merges'] = [{ s: { r: 0, c: 0 }, e: { r: 0, c: 5 } }];
    XLSX.utils.book_append_sheet(wb, ws, 'Jornadas');
    XLSX.writeFile(wb, fname + '.xlsx');
}

function exportarWord(jornadas, resumo, periodoLabel, fname) {
    const linhas = jornadas.map(j => `
        <tr${j.em_andamento ? ' style="background:rgba(16,185,129,.06)"' : ''}>
            <td>${fmtData(j.data)}</td>
            <td>${j.hora_inicio || '—'}</td>
            <td>${j.hora_fim || '—'}</td>
            <td>${j.em_andamento ? '—' : j.total_horas_formatado}</td>
            <td>${fmtBR(j.km_inicial)}</td>
            <td>${j.km_final != null ? fmtBR(j.km_final) : '—'}</td>
            <td>${j.em_andamento ? '—' : fmtBR(j.total_km)}</td>
            <td><strong>${j.valor_bruto != null ? 'R$ ' + fmtBR(j.valor_bruto) : '—'}</strong></td>
            <td>${j.em_andamento ? '—' : 'R$ ' + fmtBR(j.preco_por_km)}</td>
            <td>${j.em_andamento ? '—' : 'R$ ' + fmtBR(j.preco_por_hora)}</td>
        </tr>`).join('');
    const html = `<!doctype html><html xmlns:o="urn:schemas-microsoft-com:office:office" xmlns:w="urn:schemas-microsoft-com:office:word" xmlns="http://www.w3.org/TR/REC-html40">
<head><meta charset="utf-8"><title>Rota Certa</title>
<style>
@page { size: A4 landscape; margin: 1.5cm; }
body { font-family: Calibri, Arial, sans-serif; color: #111827; }
h1 { color: #0f1e3a; margin: 0 0 4px; font-size: 24pt; }
.sub { color: #6b7280; font-size: 10pt; margin: 0 0 16px; }
.summary { background: #ecfdf5; border-left: 4px solid #10b981; padding: 12px 16px; margin-bottom: 18px; }
.summary p { margin: 4px 0; }
.summary strong { color: #059669; }
table { border-collapse: collapse; width: 100%; font-size: 10pt; }
th { background: #0f1e3a; color: white; padding: 8px; text-align: left; font-weight: bold; }
td { padding: 6px 8px; border-bottom: 1px solid #e5e7eb; }
tr:nth-child(even) td { background: #f3f4f6; }
.footer { margin-top: 24px; font-size: 8pt; color: #9ca3af; text-align: center; }
</style></head>
<body>
<h1>Rota Certa — Histórico de jornadas</h1>
<p class="sub"><strong>Período:</strong> ${periodoLabel} &nbsp;·&nbsp; <strong>Gerado em:</strong> ${new Date().toLocaleString('pt-BR')}</p>
<div class="summary">
    <p>Total recebido: <strong>R$ ${fmtBR(resumo.total_bruto)}</strong> em ${resumo.total_jornadas} jornadas</p>
    <p>${fmtBR(resumo.total_km)} km percorridos · ${fmtBR(resumo.total_horas)} horas trabalhadas</p>
    <p>Médias: R$ ${fmtBR(resumo.media_por_km)}/km · R$ ${fmtBR(resumo.media_por_hora)}/h</p>
</div>
<table>
    <thead><tr>${HEADER_COLUNAS.map(h => `<th>${h}</th>`).join('')}</tr></thead>
    <tbody>${linhas}</tbody>
</table>
<p class="footer">Rota Certa · https://claytonapps.github.io/Rota-Certa/</p>
</body></html>`;
    const blob = new Blob(['﻿' + html], { type: 'application/msword' });
    const a = document.createElement('a');
    a.href = URL.createObjectURL(blob);
    a.download = fname + '.doc';
    a.click();
    URL.revokeObjectURL(a.href);
}

function exportarJSON(jornadas, fname) {
    // Para JSON exporto a forma "pura" do banco (sem campos enriquecidos)
    const dados = jornadas.map(j => ({
        id: j.id, data: j.data,
        hora_inicio: j.hora_inicio, hora_fim: j.hora_fim,
        km_inicial: j.km_inicial, km_final: j.km_final,
        valor_bruto: j.valor_bruto,
    }));
    const blob = new Blob([JSON.stringify(dados, null, 2)], { type: 'application/json' });
    const a = document.createElement('a');
    a.href = URL.createObjectURL(blob);
    a.download = fname + '.json';
    a.click();
    URL.revokeObjectURL(a.href);
}

function importar(file) {
    const reader = new FileReader();
    reader.onload = () => {
        try {
            const arr = JSON.parse(reader.result);
            if (!Array.isArray(arr)) throw new Error('Formato inválido');
            save(arr); alerta(`Importadas ${arr.length} jornadas.`); render();
        } catch (e) { alerta('Arquivo inválido.', 'danger'); }
    };
    reader.readAsText(file);
}
